name: Update Meteo Vigilance

on:
  schedule:
    # Heures calculées pour l'HIVER (Paris = UTC+1)
    # 05:10 UTC -> 06:10 Paris
    # 09:10 UTC -> 10:10 Paris
    # 13:10 UTC -> 14:10 Paris
    # 15:10 UTC -> 16:10 Paris
    # 19:10 UTC -> 20:10 Paris
    # 23:10 UTC -> 00:10 Paris
    - cron: '10 5,9,13,15,19,23 * * *'
  # Permet aussi de lancer manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:

# Permissions nécessaires pour que le workflow puisse committer et pousser
permissions:
  contents: write

env:
  # Force Node.js 24 pour éviter le warning de dépréciation Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-vigilance:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du repo avec le token qui autorise le push
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # 2. Installer Python et la dépendance requests
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # 3. Lancer le script de mise à jour
      - name: Run update_vigilance.py
        env:
          MF_API_KEY: ${{ secrets.MF_API_KEY }}
        run: python update_vigilance.py

      # 4. Committer et pousser le fichier mis à jour si des changements existent
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vigilance_active.geojson
          # Ne committer que s'il y a des changements
          if git diff --staged --quiet; then
            echo "Aucun changement dans vigilance_active.geojson — pas de commit."
          else
            git commit -m "chore: update vigilance_active.geojson [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD:main
          fi
